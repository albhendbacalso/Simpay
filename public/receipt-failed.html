<!DOCTYPE html>
<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Transaction Failed - SimPay</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />

    <style>
      body { font-family: "Public Sans", sans-serif; }
    </style>
  </head>

  <body class="bg-slate-100 min-h-screen flex items-center justify-center p-4 antialiased">
    <div class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-40 transition-opacity"></div>

    <div class="relative z-50 w-full max-w-md bg-white rounded-xl shadow-xl overflow-hidden flex flex-col">
      <div class="bg-red-50 p-6 flex flex-col items-center justify-center text-center border-b border-red-100">
        <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mb-4">
          <span class="material-symbols-outlined text-4xl text-red-600" style="font-variation-settings:'FILL' 1;">error</span>
        </div>
        <h2 class="text-2xl font-bold tracking-tight text-red-700 mb-1">Transaction Failed</h2>
        <p id="reasonText" class="text-red-600 font-medium">Payment could not be processed</p>
      </div>

      <div class="p-6 flex-grow bg-white">
        <p class="text-sm text-slate-500 mb-6 text-center leading-relaxed">
          Your payment could not be processed. Please check your balance or try again.
        </p>

        <div class="space-y-4">
          <div class="flex justify-between items-center py-2 border-b border-slate-100">
            <span class="text-sm text-slate-500">Status</span>
            <span class="text-sm font-medium text-slate-800">FAILED</span>
          </div>
          <div class="flex justify-between items-center py-2 border-b border-slate-100">
            <span class="text-sm text-slate-500">Reason</span>
            <span id="reasonDetail" class="text-sm font-medium text-slate-800">—</span>
          </div>
        </div>
      </div>

      <div class="p-6 bg-slate-50 border-t border-slate-100 flex flex-col gap-3">
        <button id="tryAgainBtn" class="w-full py-3 px-4 bg-red-600 hover:bg-red-700 text-white font-semibold rounded-lg transition-colors flex items-center justify-center gap-2">
          <span class="material-symbols-outlined text-sm">refresh</span>
          Try Again
        </button>

        <button id="backItemsBtn" class="w-full py-3 px-4 bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 font-medium rounded-lg transition-colors flex items-center justify-center gap-2">
          <span class="material-symbols-outlined text-sm">inventory_2</span>
          Back to Items
        </button>

        <button id="backDashBtn" class="mt-2 text-center w-full text-sm text-slate-500 hover:text-slate-700 transition-colors">
          Return to Dashboard
        </button>
      </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/receipt-failed.js"></script>
  </body>
</html>
