<!DOCTYPE html>
<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>User Profile - SimPay</title>

    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <style>
      body { font-family: "Public Sans", sans-serif; }
      .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24; }
    </style>
  </head>

  <body class="bg-gray-50 text-gray-900 antialiased">
    <aside class="fixed left-0 top-0 h-full flex flex-col p-4 z-40 bg-gray-50 h-screen w-64 border-r border-gray-200 font-sans text-sm font-semibold">
      <div class="flex items-center gap-3 mb-8 px-2">
        <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white">
          <span class="material-symbols-outlined">account_balance_wallet</span>
        </div>
        <div>
          <h1 class="text-xl font-bold text-blue-600">SimPay</h1>
          <p class="text-[10px] uppercase tracking-wider text-gray-500">Profile</p>
        </div>
      </div>

      <nav class="flex-1 space-y-1">
        <a class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-100 rounded-lg transition-all" href="/dashboard.html">
          <span class="material-symbols-outlined">home</span> Home
        </a>
        <a class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-100 rounded-lg transition-all" href="/items.html">
          <span class="material-symbols-outlined">inventory_2</span> Items
        </a>
        <a class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-100 rounded-lg transition-all" href="/checkout.html">
          <span class="material-symbols-outlined">shopping_cart</span> Checkout
        </a>
        <a class="flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-100 rounded-lg transition-all" href="/history.html">
          <span class="material-symbols-outlined">history</span> History
        </a>
      </nav>

      <div class="mt-auto border-t border-gray-200 pt-4">
        <a id="logoutBtn" class="flex items-center gap-3 px-4 py-3 text-red-600 hover:bg-red-50 rounded-lg transition-all" href="#">
          <span class="material-symbols-outlined">logout</span> Logout
        </a>
      </div>
    </aside>

    <main class="ml-64 min-h-screen">
      <header class="sticky top-0 z-50 flex justify-between items-center px-8 h-16 w-full bg-white border-b border-gray-200">
        <div class="flex items-center gap-2">
          <span class="text-gray-400 material-symbols-outlined">person</span>
          <span class="font-bold">User Profile</span>
        </div>
        <a class="text-sm font-bold text-blue-600 hover:underline" href="/dashboard.html">Back</a>
      </header>

      <div class="p-10 max-w-4xl mx-auto">
        <div class="flex items-center justify-between mb-10">
          <div>
            <h2 class="text-3xl font-extrabold tracking-tight text-gray-900">Account</h2>
            <p class="text-gray-500 mt-1">View your account details and balance.</p>
          </div>
          <div class="bg-blue-50 px-4 py-2 rounded-lg border border-blue-100">
            <span class="text-xs font-bold text-blue-600 uppercase tracking-widest">Available Balance</span>
            <p id="balanceText" class="text-2xl font-black text-blue-700">₱ 0.00</p>
          </div>
        </div>

        <div id="msg" class="hidden mb-6 text-sm font-medium rounded-xl p-3"></div>

        <div class="bg-white p-8 rounded-xl shadow-sm border border-gray-100">
          <div class="flex items-center gap-3 mb-6">
            <div class="p-2 bg-blue-50 text-blue-600 rounded-lg">
              <span class="material-symbols-outlined">mail</span>
            </div>
            <h3 class="text-lg font-bold text-gray-800">Login Email</h3>
          </div>

          <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-lg border border-gray-100">
            <span class="material-symbols-outlined text-gray-400 text-sm">badge</span>
            <span id="emailText" class="text-sm font-semibold">—</span>
          </div>

          <div class="mt-8 flex gap-3">
            <a href="/cashin.html" class="px-4 py-2 rounded-lg bg-blue-600 text-white font-bold hover:bg-blue-700 transition-colors">Cash In</a>
            <a href="/sendmoney.html" class="px-4 py-2 rounded-lg bg-white border border-gray-200 text-gray-800 font-bold hover:bg-gray-50 transition-colors">Send Money</a>
          </div>
        </div>
      </div>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/profile.js"></script>
  </body>
</html>
