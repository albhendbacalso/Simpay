<!DOCTYPE html>
<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Transaction Receipt - SimPay</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />

    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {},
            borderRadius: { DEFAULT: "0.25rem", lg: "0.5rem", xl: "0.75rem", full: "9999px" },
            fontFamily: { headline: ["Public Sans"], body: ["Public Sans"], label: ["Public Sans"] }
          }
        }
      };
    </script>

    <style>
      body { font-family: "Public Sans", sans-serif; }
      .material-symbols-outlined { font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24; }
    </style>
  </head>

  <body class="bg-slate-100 flex items-center justify-center min-h-screen p-4">
    <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-40 flex items-center justify-center p-4">
      <div class="bg-white w-full max-w-lg rounded-xl shadow-2xl overflow-hidden flex flex-col relative">
        <div class="bg-blue-600 px-8 pt-10 pb-16 text-center relative overflow-hidden">
          <div class="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none">
            <div class="absolute -top-10 -left-10 w-40 h-40 bg-white rounded-full"></div>
            <div class="absolute -bottom-10 -right-10 w-64 h-64 bg-white rounded-full"></div>
          </div>
          <div class="relative z-10">
            <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
              <span class="material-symbols-outlined text-blue-600 text-4xl" style="font-variation-settings:'FILL' 1;">check_circle</span>
            </div>
            <h1 class="text-white text-2xl font-bold tracking-tight mb-1">Payment Successful</h1>
            <p class="text-blue-100 text-sm font-medium">Transaction completed via SimPay</p>
          </div>
        </div>

        <div class="px-8 -mt-8 relative z-20">
          <div class="bg-white rounded-xl shadow-md border border-slate-100 p-6">
            <!-- Error area -->
            <div id="err" class="hidden mb-4 text-sm font-medium rounded-lg p-3 bg-red-50 text-red-700 border border-red-200"></div>

            <div class="flex justify-between items-start mb-6">
              <div>
                <p class="text-[10px] uppercase tracking-widest text-slate-400 font-bold mb-1">Receipt Code</p>
                <p id="receiptCode" class="text-slate-800 font-mono text-sm">—</p>
              </div>
              <div class="text-right">
                <p class="text-[10px] uppercase tracking-widest text-slate-400 font-bold mb-1">Date &amp; Time</p>
                <p id="dateTime" class="text-slate-800 text-sm">—</p>
              </div>
            </div>

            <div class="mb-6 p-4 bg-slate-50 rounded-lg border border-slate-100">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-white border border-slate-200 shadow-sm flex items-center justify-center">
                  <span class="material-symbols-outlined text-slate-700">person</span>
                </div>
                <div>
                  <p class="text-[10px] uppercase tracking-widest text-slate-400 font-bold">Customer</p>
                  <p id="customerEmail" class="text-slate-900 font-bold">—</p>
                </div>
              </div>
            </div>

            <!-- Items list (dynamic) -->
            <div id="itemsList" class="space-y-4 mb-8"></div>

            <div class="pt-4 mt-4 border-t border-dashed border-slate-200 mb-6">
              <div class="flex justify-between items-center">
                <span class="text-slate-500 font-semibold">Total Amount</span>
                <span id="totalAmount" class="text-blue-600 text-xl font-black tracking-tight">₱ 0.00</span>
              </div>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-4">
              <button id="printBtn" class="flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg border border-slate-200 text-slate-700 font-semibold text-sm hover:bg-slate-50 transition-colors">
                <span class="material-symbols-outlined text-lg">print</span>
                Print
              </button>
              <button id="downloadBtn" class="flex items-center justify-center gap-2 px-4 py-2.5 rounded-lg border border-slate-200 text-slate-700 font-semibold text-sm hover:bg-slate-50 transition-colors">
                <span class="material-symbols-outlined text-lg">download</span>
                Download
              </button>
            </div>

            <button id="backBtn" class="w-full py-3.5 bg-blue-600 text-white rounded-lg font-bold text-sm shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all">
              Back to Dashboard
            </button>
          </div>
        </div>

        <div class="p-6 text-center">
          <p class="text-slate-400 text-[10px] uppercase tracking-tighter font-medium mb-1">Processed by</p>
          <div class="flex items-center justify-center gap-1">
            <span class="text-blue-600 font-black text-lg tracking-tighter">SimPay</span>
            <span class="text-slate-300">|</span>
            <span class="text-slate-400 text-[10px] font-bold">INTERNAL SYSTEM</span>
          </div>
        </div>

        <div class="absolute bottom-0 left-0 w-full h-1 bg-gradient-to-r from-blue-600 via-blue-400 to-blue-600"></div>
      </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/receipt-success.js"></script>
  </body>
</html>
